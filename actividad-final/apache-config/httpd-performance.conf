# ============================================
# Optimización de rendimiento de Apache
# Agregar al final de: C:\xampp\apache\conf\httpd.conf
# ============================================

# ─── Tiempos de conexión ───
Timeout 30
KeepAlive On
MaxKeepAliveRequests 100
KeepAliveTimeout 5

# ─── Compresión GZIP (mod_deflate) ───
<IfModule mod_deflate.c>
    AddOutputFilterByType DEFLATE text/html text/plain text/css
    AddOutputFilterByType DEFLATE text/javascript application/javascript
    AddOutputFilterByType DEFLATE application/json application/xml
</IfModule>

# ─── Caché de expiración en navegador (mod_expires) ───
<IfModule mod_expires.c>
    ExpiresActive On
    ExpiresByType image/jpeg "access plus 1 month"
    ExpiresByType image/png  "access plus 1 month"
    ExpiresByType image/gif  "access plus 1 month"
    ExpiresByType text/css   "access plus 1 week"
    ExpiresByType application/javascript "access plus 1 week"
</IfModule>

# ─── Caché de disco (mod_cache_disk) ───
<IfModule mod_cache_disk.c>
    CacheRoot "C:/xampp/tmp/cache"
    CacheEnable disk "/"
    CacheDirLevels 2
    CacheDirLength 1
    CacheDefaultExpire 3600
    CacheMaxExpire 86400
</IfModule>
