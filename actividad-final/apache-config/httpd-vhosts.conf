# ============================================
# Virtual Hosts — inventario.local
# Archivo: C:\xampp\apache\conf\extra\httpd-vhosts.conf
# ============================================

# Host por defecto: localhost
<VirtualHost *:80>
    ServerName localhost
    DocumentRoot "C:/xampp/htdocs"
</VirtualHost>

# Host virtual: inventario.local (HTTP → redirige a HTTPS via .htaccess)
<VirtualHost *:80>
    ServerName inventario.local
    DocumentRoot "C:/xampp/htdocs/inventario"

    <Directory "C:/xampp/htdocs/inventario">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog  "logs/inventario-error.log"
    CustomLog "logs/inventario-access.log" common
</VirtualHost>
