# ============================================================
# VirtualHost para inventario.local — HTTP (puerto 80)
# ============================================================
# Este bloque maneja las peticiones que llegan por HTTP (sin cifrar)
# al dominio inventario.local y las redirige a HTTPS (cifrado).
#
# ¿Dónde copiar este archivo?
#   Al final de: C:\xampp\apache\conf\extra\httpd-vhosts.conf
#
# ¿Qué es un VirtualHost?
#   Permite que un solo servidor Apache sirva múltiples sitios web.
#   Cada VirtualHost se asocia a un dominio (ServerName).
# ============================================================

<VirtualHost *:80>
    # ServerName: el nombre de dominio que este VirtualHost maneja
    # Cuando el navegador pide "inventario.local", Apache busca un VirtualHost
    # con este ServerName y le entrega la petición
    ServerName inventario.local

    # DocumentRoot: la carpeta del disco que contiene los archivos web
    DocumentRoot "C:/xampp/htdocs/inventario"

    # Redirect permanent: redirección 301 (permanente) de HTTP a HTTPS
    # Esto significa que CUALQUIER petición HTTP se redirige a HTTPS
    # Ejemplo: http://inventario.local/registrar.php → https://inventario.local/registrar.php
    Redirect permanent / https://inventario.local/

    # Configuración del directorio web
    <Directory "C:/xampp/htdocs/inventario">
        # Options Indexes: permite listar archivos si no hay index.php
        # Options FollowSymLinks: permite seguir enlaces simbólicos
        Options Indexes FollowSymLinks

        # AllowOverride All: permite que .htaccess controle el acceso
        # Si pones "None", el archivo .htaccess se ignora completamente
        AllowOverride All

        # Require all granted: permite el acceso desde cualquier IP
        Require all granted
    </Directory>

    # Logs de errores y accesos para HTTP
    # Estos archivos se crean en C:\xampp\apache\logs\
    ErrorLog  "logs/inventario-error.log"
    CustomLog "logs/inventario-access.log" combined
</VirtualHost>

# ============================================================
# VirtualHost para inventario.local — HTTPS (puerto 443)
# ============================================================
# Este bloque maneja las peticiones HTTPS (cifradas con SSL/TLS)
# Es el VirtualHost "real" que sirve la aplicación
# ============================================================

<VirtualHost *:443>
    ServerName inventario.local
    DocumentRoot "C:/xampp/htdocs/inventario"

    # --- Configuración SSL ---
    # SSLEngine on: activa el cifrado SSL para este VirtualHost
    SSLEngine on

    # SSLCertificateFile: ruta al certificado público (.crt)
    # Este archivo se genera con el script generar-ssl.bat
    SSLCertificateFile    "C:/xampp/apache/conf/ssl/inventario.local.crt"

    # SSLCertificateKeyFile: ruta a la clave privada (.key)
    # NUNCA compartir este archivo — es la clave secreta del servidor
    SSLCertificateKeyFile "C:/xampp/apache/conf/ssl/inventario.local.key"

    # Configuración del directorio web
    <Directory "C:/xampp/htdocs/inventario">
        # -Indexes: DESACTIVA el listado de archivos del directorio
        #   Con +Indexes, si alguien accede a una carpeta sin index.php,
        #   vería una lista de todos los archivos (inseguro)
        #   Con -Indexes, se muestra un error 403 Forbidden
        # +FollowSymLinks: permite seguir enlaces simbólicos
        Options -Indexes +FollowSymLinks

        # AllowOverride All: permite .htaccess (autenticación por contraseña)
        AllowOverride All

        Require all granted
    </Directory>

    # Logs específicos para HTTPS (separados de los de HTTP)
    ErrorLog  "logs/inventario-ssl-error.log"
    CustomLog "logs/inventario-ssl-access.log" combined
</VirtualHost>
