# ============================================================
# VirtualHost para inventario.local — HTTP (puerto 80)
# ============================================================
# Redirige todo el trafico HTTP a HTTPS automaticamente.
# Copiar este bloque dentro de:
#   C:\xampp\apache\conf\extra\httpd-vhosts.conf
# ============================================================

<VirtualHost *:80>
    ServerName inventario.local
    DocumentRoot "C:/xampp/htdocs/inventario"

    # Redireccion permanente a HTTPS
    Redirect permanent / https://inventario.local/

    <Directory "C:/xampp/htdocs/inventario">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog  "logs/inventario-error.log"
    CustomLog "logs/inventario-access.log" combined
</VirtualHost>

# ============================================================
# VirtualHost para inventario.local — HTTPS (puerto 443)
# ============================================================

<VirtualHost *:443>
    ServerName inventario.local
    DocumentRoot "C:/xampp/htdocs/inventario"

    SSLEngine on
    SSLCertificateFile    "C:/xampp/apache/conf/ssl/inventario.local.crt"
    SSLCertificateKeyFile "C:/xampp/apache/conf/ssl/inventario.local.key"

    <Directory "C:/xampp/htdocs/inventario">
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog  "logs/inventario-ssl-error.log"
    CustomLog "logs/inventario-ssl-access.log" combined
</VirtualHost>
