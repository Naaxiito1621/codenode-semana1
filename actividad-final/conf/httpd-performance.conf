# ============================================================
# Optimizacion de rendimiento para Apache (XAMPP / Windows)
# ============================================================
# Anadir estas lineas al final de:
#   C:\xampp\apache\conf\httpd.conf
# ============================================================

# --- 1. Limitar recursos del servidor (modulo mpm_winnt) ----
# En Windows, Apache usa mpm_winnt (un proceso, multiples hilos).
# ThreadsPerChild: numero maximo de conexiones simultaneas.
# MaxConnectionsPerChild: reinicia el proceso tras N peticiones
#   (0 = nunca reiniciar, valor > 0 libera memoria periodicamente).

<IfModule mpm_winnt_module>
    ThreadsPerChild      150
    MaxConnectionsPerChild 10000
</IfModule>

# --- 2. Ajustar tiempos de espera -------------------------
# Timeout: segundos que espera una peticion completa.
# KeepAlive: reutilizar conexiones TCP entre peticiones.
# MaxKeepAliveRequests: peticiones por conexion persistente.
# KeepAliveTimeout: segundos de espera entre peticiones.

Timeout 60
KeepAlive On
MaxKeepAliveRequests 100
KeepAliveTimeout 5

# --- 3. Cache de disco para archivos estaticos -------------
# Requiere los modulos: mod_cache, mod_cache_disk, mod_expires.
# Asegurate de que esten habilitados en httpd.conf:
#   LoadModule cache_module modules/mod_cache.so
#   LoadModule cache_disk_module modules/mod_cache_disk.so
#   LoadModule expires_module modules/mod_expires.so

<IfModule mod_cache.c>
    <IfModule mod_cache_disk.c>
        CacheEnable disk "/"
        CacheRoot   "C:/xampp/tmp/cache"
        CacheDirLevels 2
        CacheDirLength 1
        CacheDefaultExpire 3600
        CacheMaxExpire 86400
    </IfModule>
</IfModule>

# --- 4. Cabeceras Expires para estaticos -------------------
<IfModule mod_expires.c>
    ExpiresActive On
    ExpiresByType image/jpeg  "access plus 1 month"
    ExpiresByType image/png   "access plus 1 month"
    ExpiresByType image/gif   "access plus 1 month"
    ExpiresByType text/css    "access plus 1 week"
    ExpiresByType application/javascript "access plus 1 week"
    ExpiresByType text/html   "access plus 1 hour"
</IfModule>

# --- 5. Compresion GZIP/Deflate ---------------------------
# Requiere: LoadModule deflate_module modules/mod_deflate.so

<IfModule mod_deflate.c>
    AddOutputFilterByType DEFLATE text/html text/plain text/css
    AddOutputFilterByType DEFLATE application/javascript application/json
</IfModule>
