# ============================================================
# Optimización de rendimiento para Apache (XAMPP / Windows)
# ============================================================
# ¿Dónde pegar este contenido?
#   Al final de: C:\xampp\apache\conf\httpd.conf
#
# ¿Qué hace?
#   1. Ajusta el número de conexiones simultáneas
#   2. Configura tiempos de espera para no desperdiciar recursos
#   3. Habilita caché en disco para archivos estáticos
#   4. Establece cabeceras Expires para que el navegador cachee
#   5. Activa compresión GZIP para respuestas más pequeñas
#
# Requisitos (módulos que deben estar habilitados en httpd.conf):
#   LoadModule cache_module modules/mod_cache.so
#   LoadModule cache_disk_module modules/mod_cache_disk.so
#   LoadModule expires_module modules/mod_expires.so
#   LoadModule deflate_module modules/mod_deflate.so
# ============================================================

# =============================================================
# 1. LIMITAR RECURSOS DEL SERVIDOR (módulo mpm_winnt)
# =============================================================
# En Windows, Apache usa el modelo "mpm_winnt":
#   - UN solo proceso del sistema operativo
#   - MÚLTIPLES hilos (threads) dentro de ese proceso
#   - Cada hilo atiende una conexión de un usuario
#
# ThreadsPerChild: número máximo de hilos (conexiones simultáneas)
#   Valor por defecto: 64
#   Nosotros ponemos: 150 (permite más usuarios a la vez)
#   Cuidado: más hilos = más uso de memoria RAM
#
# MaxConnectionsPerChild: cuántas peticiones atiende antes de reiniciarse
#   El proceso se reinicia automáticamente tras N peticiones
#   Esto libera memoria que pueda haberse "fugado" (memory leak)
#   0 = nunca reiniciar (no recomendado en producción)

<IfModule mpm_winnt_module>
    ThreadsPerChild      150
    MaxConnectionsPerChild 10000
</IfModule>

# =============================================================
# 2. AJUSTAR TIEMPOS DE ESPERA
# =============================================================
#
# Timeout: segundos que Apache espera para completar una operación
#   Si una petición tarda más de 60 segundos, se cancela
#   Evita que peticiones "colgadas" consuman recursos
Timeout 60

# KeepAlive: reutilizar conexiones TCP entre peticiones
#   Sin KeepAlive: cada archivo (HTML, CSS, imagen) abre una nueva conexión
#   Con KeepAlive: una sola conexión sirve para pedir varios archivos
#   Resultado: MUCHO más rápido para páginas con varios recursos
KeepAlive On

# MaxKeepAliveRequests: máximo de peticiones por conexión persistente
#   Después de 100 peticiones, se cierra la conexión
#   Evita que una conexión monopolice recursos
MaxKeepAliveRequests 100

# KeepAliveTimeout: segundos de inactividad antes de cerrar la conexión
#   Si pasan 5 segundos sin nueva petición, se cierra
#   Valor bajo (5) para liberar recursos rápidamente
#   Valor alto (15-30) mejor experiencia pero más uso de recursos
KeepAliveTimeout 5

# =============================================================
# 3. CACHÉ DE DISCO PARA ARCHIVOS ESTÁTICOS
# =============================================================
# Apache guarda copias de las respuestas en el disco duro
# Cuando llega la misma petición, sirve la copia sin procesar de nuevo
#
# Requisitos:
#   - mod_cache y mod_cache_disk habilitados en httpd.conf
#   - La carpeta C:\xampp\tmp\cache debe existir (créala manualmente)

<IfModule mod_cache.c>
    <IfModule mod_cache_disk.c>
        # CacheEnable disk "/": activar caché para TODO el sitio
        CacheEnable disk "/"

        # CacheRoot: carpeta donde se guardan los archivos cacheados
        CacheRoot   "C:/xampp/tmp/cache"

        # Estructura de subdirectorios en la caché (organización interna)
        CacheDirLevels 2
        CacheDirLength 1

        # CacheDefaultExpire: si un archivo no tiene fecha de expiración,
        # se cachea durante 3600 segundos (1 hora)
        CacheDefaultExpire 3600

        # CacheMaxExpire: tiempo máximo en caché (24 horas = 86400 segundos)
        # Incluso si un archivo dice "cachéame 1 mes", el máximo será 24h
        CacheMaxExpire 86400
    </IfModule>
</IfModule>

# =============================================================
# 4. CABECERAS EXPIRES PARA ARCHIVOS ESTÁTICOS
# =============================================================
# Estas cabeceras le dicen al NAVEGADOR del usuario:
# "No vuelvas a pedir este archivo durante X tiempo, usa tu copia local"
#
# Esto reduce el tráfico de red y la carga del servidor porque
# el navegador no necesita pedir archivos que ya tiene

<IfModule mod_expires.c>
    ExpiresActive On

    # Imágenes: cacheadas 1 mes en el navegador
    # Las imágenes cambian poco, así que 1 mes es seguro
    ExpiresByType image/jpeg  "access plus 1 month"
    ExpiresByType image/png   "access plus 1 month"
    ExpiresByType image/gif   "access plus 1 month"

    # CSS: cacheado 1 semana
    # Los estilos cambian más que las imágenes, 1 semana es prudente
    ExpiresByType text/css    "access plus 1 week"

    # JavaScript: cacheado 1 semana
    ExpiresByType application/javascript "access plus 1 week"

    # HTML: cacheado 1 hora
    # El contenido HTML es más dinámico, así que 1 hora máximo
    ExpiresByType text/html   "access plus 1 hour"
</IfModule>

# =============================================================
# 5. COMPRESIÓN GZIP/DEFLATE
# =============================================================
# Antes de enviar la respuesta al navegador, Apache la comprime
# Un archivo HTML de 50 KB puede reducirse a ~10 KB con GZIP
# El navegador descomprime automáticamente (transparente para el usuario)
# Resultado: las páginas viajan más rápido por la red
#
# Solo comprimimos tipos de texto (HTML, CSS, JS, JSON)
# No comprimimos imágenes porque ya están comprimidas (JPEG, PNG)

<IfModule mod_deflate.c>
    AddOutputFilterByType DEFLATE text/html text/plain text/css
    AddOutputFilterByType DEFLATE application/javascript application/json
</IfModule>
