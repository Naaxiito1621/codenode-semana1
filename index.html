<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="stylesheet" href="style.css">
     
</head>
<body>
    <h1>Formulario de contacto</h1>

    <div id="error-container" style="color: red; text-align: left; margin: 10px auto; max-width: 400px; display: none;">
        <p><strong>Se encontraron los siguientes errores:</strong></p>
        <ul id="error-list"></ul>
    </div>

    <form action="form.php" method="post">
       <div>
         <label for="name">Nombre:</label>
        <input type="text" id="name" name="name" required><br><br>
       </div>
       <div>
        <label for="Apellidos">Apellidos:</label>
       <input type="text" id="Apellidos" name="Apellidos" required><br><br>
      </div>
        <div>
        <label for="email">Correo electrónico:</label>
        <input type="email" id="email" name="email" required><br><br>
        </div>
        <div>
            <label for="telefono">Numero de teléfono:</label>
            <input type="tel" id="telefono" name="telefono" placeholder="Ej: 664256891" required><br><br>
        </div>
        <div>
            <label for="Dni">Dni:</label>
            <input type="text" id="Dni" name="Dni" maxlength="9" placeholder="Ej: 12345678K" required><br><br>
        </div>
        <button type="submit">Enviar</button>
    </form>

    <script>
        // Display server-side validation errors passed via query params
        (function() {
            var params = new URLSearchParams(window.location.search);
            var errors = [];
            for (var pair of params.entries()) {
                if (pair[0].startsWith('errors')) {
                    errors.push(pair[1]);
                }
            }
            if (errors.length > 0) {
                var container = document.getElementById('error-container');
                var list = document.getElementById('error-list');
                container.style.display = 'block';
                errors.forEach(function(err) {
                    var li = document.createElement('li');
                    li.textContent = err;
                    list.appendChild(li);
                });
            }
        })();
    </script>
</body>
</html>
